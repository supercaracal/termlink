<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>termlink</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1e1e1e; color: #d4d4d4; font-family: 'Menlo', 'Monaco', 'Courier New', monospace; }

    /* ── Session list view ── */
    #session-list-view {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 48px;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }
    #toolbar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #d4d4d4;
      letter-spacing: 0.05em;
    }
    #server-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
    }
    #server-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
      flex-shrink: 0;
    }
    #server-dot.online  { background: #4caf50; }
    #server-dot.offline { background: #f44336; }
    #new-session-controls { display: flex; gap: 8px; align-items: center; }
    #session-name-input {
      background: #3c3c3c;
      border: 1px solid #555;
      border-radius: 4px;
      color: #d4d4d4;
      font: 12px/1 'Menlo', monospace;
      padding: 6px 10px;
      width: 180px;
    }
    #session-name-input::placeholder { color: #666; }
    #session-name-input:focus { outline: none; border-color: #007acc; }
    #new-session-btn {
      background: #007acc;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font: 12px/1 'Menlo', monospace;
      cursor: pointer;
    }
    #new-session-btn:hover { background: #1a8ad4; }
    #new-session-btn:disabled { background: #555; cursor: default; }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .session-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #2d2d2d;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      padding: 12px 16px;
    }
    .session-card:hover { border-color: #007acc; }
    .session-meta { display: flex; flex-direction: column; gap: 4px; }
    .session-name { font-size: 14px; color: #d4d4d4; }
    .session-time { font-size: 11px; color: #888; }
    .attach-btn {
      background: #007acc;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font: 12px/1 'Menlo', monospace;
      cursor: pointer;
      flex-shrink: 0;
    }
    .attach-btn:hover { background: #1a8ad4; }
    #empty-msg {
      color: #666;
      font-size: 13px;
      text-align: center;
      padding-top: 48px;
    }

    /* ── Terminal view ── */
    #terminal-view {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    #status-bar {
      height: 28px;
      background: #007acc;
      color: #fff;
      font: 12px/28px 'Menlo', 'Monaco', monospace;
      padding: 0 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font: 11px/1 'Menlo', monospace;
      padding: 3px 8px;
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #back-btn:hover { background: rgba(255,255,255,0.25); }
    #session-name-label {
      font-weight: 600;
      flex: 1;
    }
    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }
    #status-dot.disconnected { background: #f44336; }
    #status-text { flex-shrink: 0; }
    #terminal-container {
      flex: 1;
      padding: 4px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- Session list -->
  <div id="session-list-view">
    <div id="toolbar">
      <h1>termlink</h1>
      <span id="server-status">
        <span id="server-dot"></span>
        <span id="server-text">Connecting…</span>
      </span>
      <div id="new-session-controls">
        <input id="session-name-input" type="text" placeholder="Session name (optional)" />
        <button id="new-session-btn" type="button">+ New Session</button>
      </div>
    </div>
    <div id="session-list">
      <p id="empty-msg">No sessions. Click "+ New Session" to start one.</p>
    </div>
  </div>

  <!-- Terminal -->
  <div id="terminal-view">
    <div id="status-bar">
      <button id="back-btn" type="button">&#8592; Sessions</button>
      <span id="session-name-label"></span>
      <span id="status-dot" class="disconnected"></span>
      <span id="status-text">Connecting…</span>
    </div>
    <div id="terminal-container"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
